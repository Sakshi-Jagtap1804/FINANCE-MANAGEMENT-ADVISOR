<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enquiry Details Form</title>
    <!-- <link rel="stylesheet" href="styles.css" /> -->
  </head>
  <body>
    <div class="container">
      <h2>Enquiry Details</h2>
      <form id="enquiry-form" onsubmit="submitForm(event)">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" required />

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required />

        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="male" checked /> Male<br />
        <input type="radio" name="gender" value="female" /> Female<br />
        <input type="radio" name="gender" value="other" /> Other<br

        <label for="salsary">Salary:</label>
        <input type="number" id="salary" name="Salary" required />

        <label for="retireage">Retirement Age:</label>
        <input type="number" id="rtage" name="rtage" required />

        <label for="childrens">Childrens count (If Any) :</label>
        <input type="number" id="childrens" name="childrens" required />

        <label for="childexpense">Childrens Expenses:</label>
        <input type="number" id="childexpense" name="childexpense" required />

        <label for="parents">Parents:</label>
        <select id="parents" name="parents" required>
          <option value="volvo">Yes</option>
          <option value="saab">No</option>
        </select>

        <label for="parexpenses">Parents Health Expenses Monthly:</label>
        <input type="number" id="parexpenses" name="parexpenses" required />

        <label for="medexpenses"
          >Other Medical Expenses of Family(Annually):</label
        >
        <input type="number" id="medexpenses" name="mediexpense" required />

        <label for="loan">Any Loan:</label>
        <select id="loan" name="loan" required>
          <option value="volvo">Yes</option>
          <option value="saab">No</option>
        </select>

        <!-- <label for="loantype">Loan Type:</label>
        <input type="text" id="loantyp" name="LoanType" /> -->

        <label for="loanamount">Loan Amount:</label>
        <input type="number" id="loanamount" name="LoanAmount" required />

        <label for="loaninterest">Loan Interest Rate Annually:</label>
        <input type="number" id="loaninterest" name="loaninterest" required />

        <label for="expenditure">Expenditure:</label>
        <input type="number" id="expenditure" name="expenditure" required />

        <!-- <label for="period">Period of Investment:</label>
        <input type="number" id="loaninterest" name="LoanInterest" required />

        <label for="exreturns">Expected Returns:</label>
        <input type="number" id="loaninterest" name="LoanInterest" required />

        <label for="risk">Prefferable Risk Type:</label>
        <input type="number" id="loaninterest" name="LoanInterest" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>
        <button type="submit">Download Your Plan</button> -->

        <button
          onclick="location.href = 'plantype.html';"
          id="myButton"
          class="float-left submit-button"
        >
          Next
        </button>

        <!-- <a href="plantype.html">
          <button type="next">Next</button>
        </a> -->
      </form>
      <p id="confirmation-message" class="hidden">
        Thank you for your enquiry. We will get back to you shortly.
      </p>
    </div>
    <script src="script.js"></script>
  </body>
</html>


<script type="text/javascript">
  document.getElementById("myButton").onclick = function () {
    location.href = "plantype.html";
  };
</script>

<script>
  function submitForm(event) {
    event.preventDefault(); // Prevent form submission

    // Get form values
    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var age = document.getElementById("age").value;
    var gender = document.getElementById("gender").value;
    var salary = document.getElementById("salary").value;
    var retireage = document.getElementById("retireage").value;
    var childrens = document.getElementById("childrens").value;
    var childexpense = document.getElementById("childexpense").value;
    var parents = document.getElementById("parents").value;
    var parexpenses = document.getElementById("parexpenses").value;
    var medexpenses = document.getElementById("medexpenses").value;
    var loan = document.getElementById("loan").value;
    var loanamount = document.getElementById("loanamount").value;
    var loaninterest = document.getElementById("loaninterest").value;
    var expenditure = document.getElementById("expenditure").value;


    // Here you can perform any further validation before submitting the form

    // For this example, simply showing confirmation message
    document.getElementById("enquiry-form").reset(); // Reset form
    document.getElementById("confirmation-message").classList.remove("hidden"); // Show confirmation message
  }
</script>
